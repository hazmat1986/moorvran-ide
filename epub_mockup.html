<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Moorvran — ePub Reader Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #ECEAE3; font-family: 'Hanken Grotesk', sans-serif; color: #34322C; overflow: hidden; }
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-thumb { background: #D4D0C6; border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

#shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 10px;
  gap: 9px;
}

/* ── Top bar ── */
#topbar {
  flex: none;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}
.logo { width: 24px; height: 24px; border-radius: 6px; background: #5E6C8A; display: flex; align-items: center; justify-content: center; color: #F7F6F2; font-size: 12px; font-weight: 700; flex: none; }
.title { font-size: 13.5px; font-weight: 600; color: #2B2922; }
.sub   { font-size: 12px; color: #9A9588; }

/* ── Nav buttons ── */
.btn-nav {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid #E0DDD5; background: #FBFAF6; color: #4A4640;
  padding: 5px 12px; border-radius: 8px;
  cursor: pointer; font-family: 'Hanken Grotesk', sans-serif;
  font-size: 12.5px; font-weight: 500;
  transition: background .15s;
}
.btn-nav:hover { background: #F0EDE6; }
.btn-nav:disabled { opacity: .4; cursor: default; }

/* ── Panel ── */
#reader-panel {
  flex: 1;
  min-height: 0;
  background: #FBFAF6;
  border: 1px solid #E0DDD5;
  border-radius: 11px;
  box-shadow: 0 1px 3px rgba(30,28,22,.05);
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ── */
#toc-sidebar {
  width: 200px;
  flex: none;
  border-right: 1px solid #EAE7DF;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#toc-head {
  flex: none;
  padding: 11px 13px 9px;
  border-bottom: 1px solid #EAE7DF;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: #9A9588;
}
#toc-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.toc-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 12px;
  color: #706B61;
  line-height: 1.4;
  transition: background .12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.toc-item:hover { background: #F0EDE6; }
.toc-item.active { background: #EBE8E0; color: #1E1C18; font-weight: 600; }
.toc-num {
  width: 18px; height: 18px; border-radius: 50%;
  background: #E6E3DA; color: #9A9588;
  font-size: 9.5px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex: none; margin-top: 1px;
}
.toc-item.active .toc-num { background: #5E6C8A; color: #F7F6F2; }

/* ── Main reading area ── */
#reader-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* reading toolbar */
#reader-toolbar {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  border-bottom: 1px solid #EAE7DF;
  gap: 12px;
}
#chapter-title {
  font-size: 12.5px;
  font-weight: 600;
  color: #2B2922;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* epub viewport */
#viewer-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#viewer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.prog-track { width: 90px; height: 5px; border-radius: 3px; background: #D8D4C9; overflow: hidden; }
.prog-fill  { height: 100%; background: #5E6C8A; border-radius: 3px; transition: width .4s; width: 0%; }
.prog-label { font-size: 11.5px; color: #9A9588; min-width: 32px; }

/* ── Drop zone (shown before book loaded) ── */
#dropzone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #FBFAF6;
  z-index: 10;
  cursor: pointer;
  transition: background .15s;
}
#dropzone.drag-over { background: #F0EDE6; }
#dropzone.hidden { display: none; }
.dz-icon {
  width: 52px; height: 52px; border-radius: 12px;
  background: #EAE7DF; display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #5E6C8A;
}
.dz-label { font-size: 13.5px; font-weight: 600; color: #2B2922; }
.dz-sub   { font-size: 12px; color: #9A9588; }
.dz-border {
  position: absolute; inset: 20px;
  border: 2px dashed #D4D0C6; border-radius: 10px;
  pointer-events: none;
}
#file-input { display: none; }

/* ── Progress strip ── */
#progress-strip {
  flex: none;
  height: 3px;
  background: #EAE7DF;
}
#progress-fill {
  height: 100%;
  background: #5E6C8A;
  width: 0%;
  transition: width .3s;
}
</style>
</head>
<body>
<div id="shell">

  <!-- Top bar -->
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">M</div>
      <span class="title">ePub Reader</span>
      <span class="sub">Mockup — drop any .epub to test</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="prog-track"><div class="prog-fill" id="progress-fill"></div></div>
      <span class="prog-label" id="prog-label">0%</span>
      <button class="btn-nav" id="btn-prev" disabled onclick="prevPage()">← Prev</button>
      <button class="btn-nav" id="btn-next" disabled onclick="nextPage()">Next →</button>
    </div>
  </div>

  <!-- Reader panel -->
  <div id="reader-panel">

    <!-- TOC sidebar -->
    <div id="toc-sidebar">
      <div id="toc-head">Contents</div>
      <div id="toc-list">
        <div style="padding:20px 14px;font-size:12px;color:#9A9588;">
          Load a book to see chapters
        </div>
      </div>
    </div>

    <!-- Main area -->
    <div id="reader-main">
      <div id="reader-toolbar">
        <span id="chapter-title">No book loaded</span>
      </div>
      <div id="progress-strip"><div id="progress-fill"></div></div>
      <div id="viewer-wrap">

        <!-- Drop zone -->
        <div id="dropzone" onclick="document.getElementById('file-input').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <div class="dz-border"></div>
          <div class="dz-icon">📖</div>
          <div class="dz-label">Drop your ePub here</div>
          <div class="dz-sub">or click to browse</div>
        </div>

        <!-- epub.js renders here -->
        <div id="viewer"></div>

      </div>
    </div>

  </div>

</div>

<input type="file" id="file-input" accept=".epub" onchange="loadFile(this.files[0])">

<script>
'use strict';

let book       = null;
let rendition  = null;
let tocItems   = [];
let currentIdx = 0;

// ── Drag and drop ──────────────────────────────────────────────
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.add('drag-over');
}
function onDragLeave(e) {
  document.getElementById('dropzone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.epub')) loadFile(file);
}

// ── Load epub ──────────────────────────────────────────────────
function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => openBook(e.target.result);
  reader.readAsArrayBuffer(file);
}

function openBook(arrayBuffer) {
  // Clean up previous
  if (book) book.destroy();

  document.getElementById('dropzone').classList.add('hidden');
  document.getElementById('chapter-title').textContent = 'Loading…';

  book = ePub(arrayBuffer);

  rendition = book.renderTo('viewer', {
    width:  '100%',
    height: '100%',
    spread: 'none',
    flow:   'paginated',
  });

  // Style the iframe content to match IDE aesthetic
  rendition.themes.default({
    body: {
      'font-family': "'Georgia', serif",
      'font-size':   '15px',
      'line-height': '1.75',
      'color':       '#2B2922',
      'padding':     '20px 40px !important',
      'max-width':   '680px',
      'margin':      '0 auto',
    },
    'h1,h2,h3,h4': {
      'font-family': "'Hanken Grotesk', sans-serif",
      'color':       '#1A1815',
    },
    'pre,code': {
      'font-family': "'JetBrains Mono', monospace",
      'font-size':   '13px',
      'background':  '#F0EDE6',
      'border-radius': '6px',
      'padding':     '2px 6px',
    },
    'pre': {
      'padding':     '12px 16px',
      'line-height': '1.6',
      'overflow-x':  'auto',
    },
  });

  rendition.display();

  // Generate locations for percentage tracking (runs in background)
  book.locations.generate(1024);

  // epub.js creates sandboxed iframes internally — patch them as they appear
  const viewer = document.getElementById('viewer');
  const observer = new MutationObserver(() => {
    viewer.querySelectorAll('iframe').forEach(f => {
      if (f.hasAttribute('sandbox')) {
        f.setAttribute('sandbox', 'allow-scripts allow-same-origin');
      }
    });
  });
  observer.observe(viewer, { childList: true, subtree: true });

  // Build TOC once navigation loads
  book.loaded.navigation.then(nav => {
    tocItems = flattenToc(nav.toc);
    buildToc(tocItems);
    document.getElementById('btn-prev').disabled = false;
    document.getElementById('btn-next').disabled = false;
  });

  // Update chapter title on location change
  rendition.on('relocated', location => {
    updateProgress(location);
    highlightCurrentChapter(location);
  });
}

// ── TOC helpers ───────────────────────────────────────────────
function flattenToc(toc, depth) {
  depth = depth || 0;
  const items = [];
  toc.forEach(item => {
    items.push({ label: item.label.trim(), href: item.href, depth });
    if (item.subitems && item.subitems.length) {
      flattenToc(item.subitems, depth + 1).forEach(sub => items.push(sub));
    }
  });
  return items;
}

function buildToc(items) {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'toc-item' + (i === 0 ? ' active' : '');
    btn.style.paddingLeft = (12 + item.depth * 12) + 'px';
    btn.innerHTML = `
      <div class="toc-num">${i + 1}</div>
      <span>${item.label}</span>
    `;
    btn.onclick = () => {
      // Strip fragment — paginated mode navigates by chapter, not anchor
      const href = item.href.split('#')[0] || item.href;
      rendition.display(href).catch(() => {
        // If that fails, try the full href as a fallback
        rendition.display(item.href);
      });
      setActiveToc(i);
    };
    list.appendChild(btn);
  });
}

function setActiveToc(idx) {
  currentIdx = idx;
  document.querySelectorAll('.toc-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  if (tocItems[idx]) {
    document.getElementById('chapter-title').textContent = tocItems[idx].label;
  }
  // Scroll active item into view
  const active = document.querySelector('.toc-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function highlightCurrentChapter(location) {
  const href = location.start.href;
  const idx  = tocItems.findIndex(t => href.includes(t.href.split('#')[0]));
  if (idx >= 0) setActiveToc(idx);
}

// ── Navigation ────────────────────────────────────────────────
function prevPage() {
  if (rendition) rendition.prev();
}
function nextPage() {
  if (rendition) rendition.next();
}

// ── Progress ──────────────────────────────────────────────────
function updateProgress(location) {
  if (!book || !book.locations || !book.locations.total) return;
  const pct = book.locations.percentageFromCfi(location.start.cfi);
  if (pct !== undefined) {
    const pctRounded = Math.round(pct * 100);
    document.getElementById('progress-fill').style.width = pctRounded + '%';
    document.getElementById('prog-label').textContent    = pctRounded + '%';
  }
}

// ── Keyboard navigation ───────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!rendition) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
});
</script>
</body>
</html>
