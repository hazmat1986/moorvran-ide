<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Moorvran — Book Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#ECEAE3;font-family:'Hanken Grotesk',sans-serif;color:#34322C;overflow:hidden}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:#D4D0C6;border-radius:4px}::-webkit-scrollbar-track{background:transparent}
#shell{display:flex;flex-direction:column;height:100vh;padding:10px;gap:9px}
#topbar{flex:none;height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.logo{width:24px;height:24px;border-radius:6px;background:#5E6C8A;display:flex;align-items:center;justify-content:center;color:#F7F6F2;font-size:12px;font-weight:700;flex:none}
.t-title{font-size:13.5px;font-weight:600;color:#2B2922}
.t-sub{font-size:12px;color:#9A9588;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{border:1px solid #E0DDD5;background:#FBFAF6;color:#4A4640;padding:5px 11px;border-radius:8px;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:500;transition:background .15s}
.btn:hover{background:#F0EDE6}
.btn:disabled{opacity:.4;cursor:default}
#search-input{border:1px solid #E0DDD5;background:#FBFAF6;border-radius:8px;padding:5px 10px;font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#2B2922;outline:none;width:190px;transition:border .15s}
#search-input:focus{border-color:#5E6C8A}
#search-input::placeholder{color:#B0AB9F}
#search-count{font-size:11.5px;color:#9A9588;min-width:54px}
#panel{flex:1;min-height:0;background:#FBFAF6;border:1px solid #E0DDD5;border-radius:11px;box-shadow:0 1px 3px rgba(30,28,22,.05);display:flex;overflow:hidden}
#sidebar{width:200px;flex:none;border-right:1px solid #EAE7DF;display:flex;flex-direction:column;overflow:hidden}
#sidebar-tabs{flex:none;display:flex;border-bottom:1px solid #EAE7DF}
.stab{flex:1;padding:8px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9A9588;cursor:pointer;border:none;background:none;transition:background .12s;border-bottom:2px solid transparent}
.stab:hover{background:#F0EDE6}
.stab.on{color:#5E6C8A;border-bottom-color:#5E6C8A}
.tab-pane{flex:1;overflow-y:auto;padding:6px 0;display:none}
.tab-pane.on{display:block}
.toc-group{display:flex;flex-direction:column}
.toc-chapter{display:flex;align-items:center;gap:7px;padding:6px 11px;font-size:12px;color:#4A4640;line-height:1.4;transition:background .12s}
.toc-chapter:hover{background:#F0EDE6}
.toc-chapter.on{background:#EBE8E0;color:#1E1C18;font-weight:600}
.toc-chapter.on .toc-n{background:#5E6C8A;color:#F7F6F2}
.toc-toggle{flex:none;width:16px;height:16px;background:none;border:none;cursor:pointer;font-size:9px;color:#9A9588;display:flex;align-items:center;justify-content:center;padding:0;border-radius:3px;transition:background .12s}
.toc-toggle:hover{background:#E8E5DC;color:#4A4640}
.toc-ch-label{flex:1;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc-subs{display:none;flex-direction:column}
.toc-subs.open{display:flex}
.toc-item{display:flex;align-items:flex-start;gap:6px;padding:5px 11px 5px 30px;cursor:pointer;font-size:11.5px;color:#8A8680;line-height:1.4;border:none;background:none;width:100%;text-align:left;transition:background .12s}
.toc-item:hover{background:#F0EDE6;color:#4A4640}
.toc-item.on{background:#EBE8E0;color:#1E1C18;font-weight:600}
.toc-dot{width:5px;height:5px;border-radius:50%;background:#D4D0C6;flex:none;margin-top:5px}
.toc-item.on .toc-dot{background:#5E6C8A}
.toc-n{width:17px;height:17px;border-radius:50%;background:#E6E3DA;color:#9A9588;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.bm-item{padding:8px 11px;border-bottom:1px solid #F0EDE6}
.bm-label{font-size:12px;color:#2B2922;cursor:pointer;line-height:1.4;margin-bottom:3px}
.bm-label:hover{color:#5E6C8A}
.bm-meta{display:flex;align-items:center;justify-content:space-between}
.bm-date{font-size:10.5px;color:#9A9588}
.bm-del{background:none;border:none;cursor:pointer;color:#C0504A;font-size:13px;padding:0;line-height:1}
.bm-del:hover{color:#902020}
#bm-empty{padding:20px 13px;font-size:12px;color:#B0AB9F;text-align:center;line-height:1.6}
#reader-area{flex:1;display:flex;flex-direction:column;min-width:0}
#reader-toolbar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-bottom:1px solid #EAE7DF;gap:10px}
#chapter-title{font-size:12px;font-weight:600;color:#2B2922;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#viewer-wrap{flex:1;position:relative;overflow:hidden}
#viewer{position:absolute;inset:0;width:100%;height:100%;border:none}
#dropzone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:#FBFAF6;z-index:10;cursor:pointer;transition:background .15s}
#dropzone.drag-over{background:#F0EDE6}
#dropzone.hidden{display:none}
.dz-border{position:absolute;inset:16px;border:2px dashed #D4D0C6;border-radius:9px;pointer-events:none}
.dz-icon{font-size:32px}
.dz-label{font-size:13.5px;font-weight:600;color:#2B2922}
.dz-sub{font-size:12px;color:#9A9588;text-align:center;max-width:220px;line-height:1.55}
#file-input{display:none}
</style>
</head>
<body>
<div id="shell">

  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">M</div>
      <span class="t-title">Book Reader</span>
      <span class="t-sub" id="book-title">No book loaded</span>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <button class="btn" onclick="changeFontSize(-1)" title="Smaller">A−</button>
      <button class="btn" onclick="changeFontSize(1)"  title="Larger">A+</button>
      <button class="btn" id="btn-bm" onclick="addBookmark()" disabled>☆ Bookmark</button>
      <input type="text" id="search-input" placeholder="Search…" onkeydown="searchKey(event)" disabled>
      <span id="search-count"></span>
      <button class="btn" id="btn-search" onclick="doSearch(1)" disabled>Find</button>
      <span id="ch-counter-top" style="font-size:12px;color:#9A9588;white-space:nowrap;min-width:60px;text-align:right">— / —</span>
    </div>
  </div>

  <div id="panel">
    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="stab on" id="tab-toc" onclick="showTab(this,'toc')">Contents</button>
        <button class="stab"    id="tab-bm"  onclick="showTab(this,'bm')">Bookmarks</button>
      </div>
      <div id="pane-toc" class="tab-pane on">
        <div style="padding:16px 13px;font-size:12px;color:#B0AB9F;line-height:1.5">Select your index.html to load</div>
      </div>
      <div id="pane-bm" class="tab-pane">
        <div id="bm-empty">No bookmarks yet.<br>Click ☆ Bookmark to save your place.</div>
      </div>
    </div>

    <div id="reader-area">
      <div id="reader-toolbar">
        <span id="chapter-title">—</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="ch-counter" style="font-size:12px;color:#9A9588;white-space:nowrap"></span>
          <button class="btn" id="btn-prev" disabled onclick="prevSection()">↑ Prev</button>
          <button class="btn" id="btn-next" disabled onclick="nextSection()">Next ↓</button>
        </div>
      </div>
      <div id="viewer-wrap">
        <div id="dropzone"
             onclick="document.getElementById('file-input').click()"
             ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="onDrop(event)">
          <div class="dz-border"></div>
          <div class="dz-icon">📖</div>
          <div class="dz-label">Select your index.html</div>
          <div class="dz-sub">From your Calibre HTMLZ export — your place is saved between sessions</div>
        </div>
        <iframe id="viewer"></iframe>
      </div>
    </div>
  </div>

</div>
<input type="file" id="file-input" accept=".html,.htm" onchange="loadFile(this.files[0])">

<script>
'use strict';

const KEY_POS = 'mv_html_pos';
const KEY_BMS = 'mv_html_bms';
const KEY_FS  = 'mv_html_fs';

let tocItems      = [];
let bookmarks     = [];
let fontScale     = 100;
let blobUrl       = null;
let searchMatches = [];
let searchIdx     = 0;
let lastSearch    = '';
let activeId      = null;
let scrollTimer   = null;

const iframe = document.getElementById('viewer');

// ── File loading ─────────────────────────────────────────────────
function dragOver(e)  { e.preventDefault(); document.getElementById('dropzone').classList.add('drag-over'); }
function dragLeave()  { document.getElementById('dropzone').classList.remove('drag-over'); }
function onDrop(e)    { e.preventDefault(); dragLeave(); loadFile(e.dataTransfer.files[0]); }

function loadFile(file) {
  if (!file) return;
  document.getElementById('book-title').textContent = file.name.replace(/\.(html?)$/i,'');
  document.getElementById('chapter-title').textContent = 'Loading…';
  const reader = new FileReader();
  reader.onload = e => {
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    const html = injectStyles(e.target.result);
    const blob = new Blob([html], { type: 'text/html' });
    blobUrl = URL.createObjectURL(blob);
    iframe.src = blobUrl;
  };
  reader.readAsText(file);
  try { bookmarks = JSON.parse(localStorage.getItem(KEY_BMS) || '[]'); } catch(e) { bookmarks = []; }
  renderBookmarks();
}

function injectStyles(html) {
  const fs = localStorage.getItem(KEY_FS);
  if (fs) fontScale = +fs;
  const css = `<style id="mv-css">
body{font-family:Georgia,'Times New Roman',serif!important;font-size:${fontScale}%!important;line-height:1.8!important;color:#2B2922!important;background:#FBFAF6!important;padding:24px 48px 60px!important;max-width:780px!important;margin:0 auto!important}
h1,h2,h3,h4,h5,h6{font-family:'Hanken Grotesk',sans-serif!important;color:#1A1815!important;margin-top:1.8em!important;margin-bottom:0.6em!important;line-height:1.3!important}
h1{font-size:1.8em!important;border-bottom:2px solid #EAE7DF;padding-bottom:.3em}
h2{font-size:1.35em!important}
h3{font-size:1.15em!important;color:#34322C!important}
pre,code{font-family:'JetBrains Mono','Courier New',monospace!important;font-size:.88em!important;background:#F0EDE6!important;border-radius:5px!important}
pre{padding:14px 18px!important;line-height:1.6!important;overflow-x:auto!important;margin:1em 0!important;border:1px solid #E4E1D8!important}
code{padding:2px 6px!important}
pre code{padding:0!important;background:none!important}
p{margin-bottom:.85em!important}
a{color:#5E6C8A!important}
img{max-width:100%!important;height:auto!important;border-radius:6px!important}
table{border-collapse:collapse!important;width:100%!important;margin:1em 0!important}
th,td{border:1px solid #E4E1D8!important;padding:8px 12px!important;text-align:left!important}
th{background:#F0EDE6!important;font-family:'Hanken Grotesk',sans-serif!important}
mark.mv-hl{background:#FDE68A!important;border-radius:2px!important}
</style>`;
  return html.includes('</head>') ? html.replace('</head>', css + '</head>') : css + html;
}

// ── Iframe ready ─────────────────────────────────────────────────
iframe.addEventListener('load', () => {
  const src = iframe.src || '';
  if (!src || src === 'about:blank') return;
  const doc = iframe.contentDocument;
  if (!doc || !doc.body) return;
  buildToc(doc);
  restorePosition(doc);
  setupScrollTracking(doc);
  enableControls();
  document.getElementById('dropzone').classList.add('hidden');
});

function enableControls() {
  ['btn-prev','btn-next','btn-bm','btn-search','search-input'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = false;
  });
}

function _chLabel(label, fallback) {
  const part = label.match(/^part\s+(\d+)/i);
  if (part) return ['I','II','III','IV','V','VI'][+part[1]-1] || part[1];
  const app = label.match(/appendix\s+([A-Z])/i) || label.match(/^([A-Z])[.:)]/);
  if (app) return app[1].toUpperCase();
  const num = label.match(/^(?:chapter\s+)?(\d+)/i);
  if (num) return num[1];
  if (/^preface/i.test(label))              return 'P';
  if (/^introduction/i.test(label))          return 'Intro';
  if (/^(table of )?contents/i.test(label)) return 'C';
  if (/^acknowledgment/i.test(label))        return 'Ack';
  if (/^foreword/i.test(label))             return 'F';
  return String(fallback);
}

// ── TOC ──────────────────────────────────────────────────────────
function buildToc(doc) {
  const headings = Array.from(doc.querySelectorAll('h1,h2,h3,h4'));
  tocItems = [];
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'mv-h-' + i;
    tocItems.push({ id: h.id, label: h.textContent.trim(), depth: parseInt(h.tagName[1]) - 1 });
  });

  const pane = document.getElementById('pane-toc');
  pane.innerHTML = '';
  let chNum = 0;
  let i = 0;

  while (i < tocItems.length) {
    const item = tocItems[i];

    if (item.depth === 0) {
      chNum++;
      const subs = [];
      let j = i + 1;
      while (j < tocItems.length && tocItems[j].depth > 0) {
        subs.push({ item: tocItems[j], idx: j });
        j++;
      }

      const group = document.createElement('div');
      group.className = 'toc-group';

      const header = document.createElement('div');
      header.className = 'toc-chapter';
      header.dataset.idx = i;

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'toc-toggle';
      toggleBtn.textContent = subs.length ? '\u25b6' : ' ';
      toggleBtn.setAttribute('aria-label', 'Toggle');

      const numEl = document.createElement('div');
      numEl.className = 'toc-n';
      numEl.textContent = _chLabel(item.label, chNum);

      const labelEl = document.createElement('span');
      labelEl.className = 'toc-ch-label';
      labelEl.textContent = item.label;
      labelEl.title = item.label;

      header.appendChild(toggleBtn);
      header.appendChild(numEl);
      header.appendChild(labelEl);
      group.appendChild(header);

      if (subs.length) {
        const subList = document.createElement('div');
        subList.className = 'toc-subs';
        subs.forEach(({ item: sub, idx }) => {
          const btn = document.createElement('button');
          btn.className = 'toc-item';
          btn.dataset.idx = idx;
          const dot = document.createElement('div');
          dot.className = 'toc-dot';
          const txt = document.createElement('span');
          txt.textContent = sub.label;
          btn.appendChild(dot);
          btn.appendChild(txt);
          btn.onclick = () => scrollToSection(idx);
          subList.appendChild(btn);
        });
        group.appendChild(subList);
        toggleBtn.onclick = (e) => { e.stopPropagation(); toggleChapter(group); };
        header.style.cursor = 'pointer';
        header.onclick = () => scrollToSection(i);
      } else {
        toggleBtn.style.pointerEvents = 'none';
        header.style.cursor = 'pointer';
        header.onclick = () => scrollToSection(i);
      }

      pane.appendChild(group);
      i = j;
    } else {
      i++;
    }
  }
  updateCounter(0);
}

function toggleChapter(group) {
  const subs   = group.querySelector('.toc-subs');
  const toggle = group.querySelector('.toc-toggle');
  if (!subs) return;
  const open = subs.classList.contains('open');
  subs.classList.toggle('open', !open);
  if (toggle) toggle.textContent = open ? '\u25b6' : '\u25bc';
}

function scrollToSection(idx) {
  if (idx < 0 || idx >= tocItems.length) return;
  const el = iframe.contentDocument && iframe.contentDocument.getElementById(tocItems[idx].id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setActiveToc(idx);
  }
}

function setActiveToc(idx) {
  document.querySelectorAll('.toc-chapter').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('on'));

  if (!tocItems[idx]) return;

  if (tocItems[idx].depth === 0) {
    const header = document.querySelector('.toc-chapter[data-idx="' + idx + '"]');
    if (header) header.classList.add('on');
  } else {
    const subBtn = document.querySelector('.toc-item[data-idx="' + idx + '"]');
    if (subBtn) {
      subBtn.classList.add('on');
      const group = subBtn.closest('.toc-group');
      if (group) {
        const subs   = group.querySelector('.toc-subs');
        const toggle = group.querySelector('.toc-toggle');
        if (subs)   subs.classList.add('open');
        if (toggle) toggle.textContent = '\u25bc';
      }
    }
  }

  document.getElementById('chapter-title').textContent = tocItems[idx].label;
  activeId = tocItems[idx].id;
  const active = document.querySelector('.toc-chapter.on, .toc-item.on');
  if (active) active.scrollIntoView({ block: 'nearest' });
  updateCounter(idx);
}

function updateCounter(idx) {
  const top   = tocItems.filter(t => t.depth === 0);
  const total = top.length;
  if (!total) return;
  const cur   = tocItems.slice(0, idx + 1).filter(t => t.depth === 0).length;
  const label = 'Ch ' + cur + ' / ' + total;
  document.getElementById('ch-counter').textContent     = label;
  document.getElementById('ch-counter-top').textContent = label;
}

function prevSection() { scrollToSection(getCurrentIdx() - 1); }
function nextSection() { scrollToSection(getCurrentIdx() + 1); }
function getCurrentIdx() {
  const a = document.querySelector('.toc-chapter.on, .toc-item.on');
  return a ? +a.dataset.idx : 0;
}

// ── Scroll tracking ───────────────────────────────────────────────
function setupScrollTracking(doc) {
  iframe.contentWindow.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const scrollY = iframe.contentWindow.scrollY + 80;
      let bestIdx = 0;
      tocItems.forEach((item, i) => {
        const el = doc.getElementById(item.id);
        if (el && el.offsetTop <= scrollY) bestIdx = i;
      });
      setActiveToc(bestIdx);
      localStorage.setItem(KEY_POS, tocItems[bestIdx] ? tocItems[bestIdx].id : '');
    }, 150);
  }, { passive: true });
}

function restorePosition(doc) {
  const savedId = localStorage.getItem(KEY_POS);
  if (!savedId) return;
  const idx = tocItems.findIndex(t => t.id === savedId);
  if (idx >= 0) setTimeout(() => scrollToSection(idx), 250);
}

// ── Font size ─────────────────────────────────────────────────────
function changeFontSize(dir) {
  fontScale = Math.max(70, Math.min(160, fontScale + dir * 10));
  localStorage.setItem(KEY_FS, fontScale);
  const style = iframe.contentDocument && iframe.contentDocument.getElementById('mv-css');
  if (style) {
    style.textContent = style.textContent.replace(/font-size:\d+%!important/, `font-size:${fontScale}%!important`);
  }
}

// ── Bookmarks ─────────────────────────────────────────────────────
function addBookmark() {
  const label = document.getElementById('chapter-title').textContent;
  if (!activeId || !label || label === '—') return;
  if (bookmarks.find(b => b.id === activeId)) return;
  bookmarks.push({ id: activeId, label, date: new Date().toLocaleDateString() });
  localStorage.setItem(KEY_BMS, JSON.stringify(bookmarks));
  renderBookmarks();
  const btn = document.getElementById('btn-bm');
  btn.textContent = '★ Saved';
  setTimeout(() => btn.textContent = '☆ Bookmark', 1500);
}

function deleteBookmark(id) {
  bookmarks = bookmarks.filter(b => b.id !== id);
  localStorage.setItem(KEY_BMS, JSON.stringify(bookmarks));
  renderBookmarks();
}

function renderBookmarks() {
  const pane  = document.getElementById('pane-bm');
  const empty = document.getElementById('bm-empty');
  pane.querySelectorAll('.bm-item').forEach(el => el.remove());
  empty.style.display = bookmarks.length ? 'none' : 'block';
  bookmarks.forEach(bm => {
    const div = document.createElement('div');
    div.className = 'bm-item';
    div.innerHTML = `<div class="bm-label">${esc(bm.label)}</div><div class="bm-meta"><span class="bm-date">${bm.date}</span><button class="bm-del" title="Remove">×</button></div>`;
    div.querySelector('.bm-label').onclick = () => {
      const idx = tocItems.findIndex(t => t.id === bm.id);
      if (idx >= 0) scrollToSection(idx);
    };
    div.querySelector('.bm-del').onclick = e => { e.stopPropagation(); deleteBookmark(bm.id); };
    pane.appendChild(div);
  });
}

// ── Search ────────────────────────────────────────────────────────
function searchKey(e) {
  if (e.key === 'Enter') doSearch();
  else lastSearch = ''; // any keystroke clears cycle cache
}

function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  const doc   = iframe.contentDocument;
  if (!query || !doc) return;

  // Same query — just cycle to next match
  if (query === lastSearch && searchMatches.length > 0) {
    searchIdx = (searchIdx + 1) % searchMatches.length;
    searchMatches[searchIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    document.getElementById('search-count').textContent = `${searchIdx + 1} / ${searchMatches.length}`;
    return;
  }

  // New query — clear old highlights and re-search
  lastSearch = query;
  searchIdx  = 0;

  doc.querySelectorAll('mark.mv-hl').forEach(m => {
    m.replaceWith(doc.createTextNode(m.textContent));
  });
  doc.body.normalize();
  searchMatches = [];

  const regex  = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
  const nodes  = [];
  let node;
  while ((node = walker.nextNode())) {
    if (regex.test(node.textContent)) nodes.push(node);
    regex.lastIndex = 0;
  }

  nodes.forEach(n => {
    const frag  = doc.createDocumentFragment();
    const parts = n.textContent.split(regex);
    const found = n.textContent.match(regex) || [];
    parts.forEach((part, i) => {
      if (part) frag.appendChild(doc.createTextNode(part));
      if (found[i]) {
        const mark = doc.createElement('mark');
        mark.className = 'mv-hl';
        mark.textContent = found[i];
        searchMatches.push(mark);
        frag.appendChild(mark);
      }
    });
    n.parentNode.replaceChild(frag, n);
  });

  const count = searchMatches.length;
  if (count) {
    searchMatches[0].scrollIntoView({ block: 'center', behavior: 'smooth' });
    document.getElementById('search-count').textContent = `1 / ${count}`;
  } else {
    document.getElementById('search-count').textContent = 'Not found';
  }
}

// ── Sidebar tabs ──────────────────────────────────────────────────
function showTab(btn, tab) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.stab').forEach(el => el.classList.remove('on'));
  document.getElementById('pane-' + tab).classList.add('on');
  btn.classList.add('on');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
